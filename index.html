<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Biyometrik Tarayıcı</title>
    <style>
        body { background: #111; color: white; text-align: center; }
        #container { position: relative; display: inline-block; }
        #video, #overlay { width: 400px; height: 400px; }
        #overlay { position: absolute; top: 0; left: 0; }
        #status { font-size: 20px; color: #0f0; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Biyometrik Tarama Başlatılıyor...</h2>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
    </div>
    <div id="status">Sistem Bekleniyor...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const db = getDatabase(initializeApp({ /* firebaseConfig */ }));
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');

    // Kamera
    navigator.mediaDevices.getUserMedia({video: true}).then(s => video.srcObject = s);

    // Veritabanını Dinle
    onValue(ref(db, 'biometricGame/profile'), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        let currentIndex = 0;
        const points = data.points;

        // Her 2 saniyede bir noktayı tara
        const interval = setInterval(async () => {
            if(currentIndex >= points.length) {
                clearInterval(interval);
                document.getElementById('status').innerText = "✅ Erişim Onaylandı!";
                return;
            }

            const p = points[currentIndex];
            document.getElementById('status').innerText = `Taranıyor: ${p.label}...`;

            // Görsel Tarama Efekti (Overlay'e çiz)
            ctx.clearRect(0, 0, 400, 400);
            ctx.strokeStyle = "lime";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 30, 0, Math.PI*2);
            ctx.stroke();

            // Küçük bir yapay zeka simülasyonu
            await new Promise(r => setTimeout(r, 1500));
            currentIndex++;
        }, 2000);
    });
</script>
</body>
</html>
