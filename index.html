<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Tarama ve Liveness Tespiti</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background-color: #121212; color: white; padding: 20px; }
        #camera-container { position: relative; display: inline-block; margin-top: 30px; }
        video { border: 4px solid #333; border-radius: 15px; transform: scaleX(-1); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        #status-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; font-weight: bold; background: rgba(0,0,0,0.7);
            border-radius: 15px; display: none; text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            flex-direction: column; backdrop-filter: blur(3px);
        }
        #status-text { font-size: 22px; margin-top: 15px; text-align: center; padding: 0 10px; }
        
        /* Tarama çizgisi efekti */
        .scan-line {
            width: 100%; height: 4px; background: rgba(0, 255, 0, 0.6);
            position: absolute; top: 0; left: 0; box-shadow: 0 0 10px rgba(0,255,0,0.8);
            animation: scan 2s infinite linear; display: none;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>

    <h2>Güvenlik Doğrulama Terminali</h2>
    <p style="color:#aaa;">Sistem hazır. Kayıt ekranından doğrulama sinyali bekleniyor...</p>

    <div id="camera-container">
        <video id="webcam" width="400" height="400" autoplay playsinline></video>
        <div class="scan-line" id="scan-line"></div>
        <div id="status-overlay">
            <span id="icon">⏳</span>
            <span id="status-text">Bağlantı Kuruluyor...</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_DeLxJMTyRgQ3Agz0zYAen47XqA2Kq9Y",
            authDomain: "biyo-9104d.firebaseapp.com",
            projectId: "biyo-9104d",
            storageBucket: "biyo-9104d.firebasestorage.app",
            messagingSenderId: "796487556743",
            appId: "1:796487556743:web:e72c1c8f366930f73b2222"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: true })
            .then((stream) => { video.srcObject = stream; })
            .catch((err) => { alert("Kamera açılamadı!"); });

        const overlay = document.getElementById('status-overlay');
        const icon = document.getElementById('icon');
        const statusText = document.getElementById('status-text');
        const scanLine = document.getElementById('scan-line');

        const scanDataRef = ref(db, 'biometricGame/scanData');
        
        onValue(scanDataRef, (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.status === "pending") {
                
                // 1. AŞAMA: Biyometrik Tarama Başlar
                overlay.style.display = 'flex';
                scanLine.style.display = 'block';
                icon.innerText = "🔍";
                statusText.innerText = "Yüz Biyometrisi Analiz Ediliyor...";
                statusText.style.color = "#ffeb3b"; // Sarı

                // 2.5 saniye sonra Canlılık Tespiti aşamasına geç
                setTimeout(() => {
                    // 2. AŞAMA: Canlılık Tespiti (Senin bahsettiğin kısım)
                    icon.innerText = "👀";
                    statusText.innerText = "Canlılık Testi:\nLütfen kameraya bakıp göz kırpın...";
                    statusText.style.color = "#00bcd4"; // Camgöbeği
                    scanLine.style.background = "rgba(0, 188, 212, 0.6)";
                    scanLine.style.boxShadow = "0 0 10px rgba(0, 188, 212, 0.8)";

                    // 3 saniye sonra nihai sonucu ver
                    setTimeout(() => {
                        scanLine.style.display = 'none'; // Tarama çizgisini durdur

                        // Hâlâ yazı tura atıyoruz ama artık "Ölü müsün?" diye kontrol ediyormuş gibi yapıyoruz :)
                        const isSuccess = Math.random() > 0.4; // Başarı şansını %60'a çektim kıyak geçtim

                        if (isSuccess) {
                            icon.innerText = "✅";
                            statusText.innerText = "Kimlik ve Canlılık Doğrulandı!";
                            statusText.style.color = "#4CAF50";
                        } else {
                            // Belki de göz kırpmadın ve ölüsün? Reddedilme sebebini rastgele yapalım
                            icon.innerText = "❌";
                            const failReason = Math.random() > 0.5 ? "Eşleşme Başarısız!" : "Canlılık Tespiti Başarısız! (Göz kırpma algılanmadı)";
                            statusText.innerText = failReason;
                            statusText.style.color = "#f44336";
                        }

                        // Döngüye girmemesi için durumu güncelle
                        set(ref(db, 'biometricGame/scanData/status'), isSuccess ? "completed" : "failed");

                        // 4 saniye sonra ekranı temizle
                        setTimeout(() => {
                            overlay.style.display = 'none';
                        }, 4000);

                    }, 3000);
                }, 2500);
            }
        });
    </script>
</body>
</html>
