<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarama Alanı</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #eef2f3; }
        .rules { background: #ffeaa7; padding: 15px; border-radius: 8px; margin: 10px auto; max-width: 500px; text-align: left; font-weight: bold; }
        .rules p { margin: 5px 0; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { width: 100%; max-width: 400px; border-radius: 8px; border: 2px solid #ccc; display: none; transform: scaleX(-1); }
        .info { font-size: 18px; margin: 15px 0; font-weight: bold; color: #333; }
        .result { font-size: 80px; margin-top: 10px; }
        .loading { font-size: 20px; color: #ff9800; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="rules">
        <p>1_ Lütfen alnınızı açık tutun</p>
        <p>2_ Gözlerinizi kameradan ayırmayın dik bakın</p>
        <p>3_ Gülümseyin</p>
    </div>

    <div class="container">
        <h2>Tarama Merkezi</h2>
        <p>Kayıt alanından fotoğraf bekleniyor...</p>
        
        <img id="gelenFoto" src="" alt="Gelen Yüz Verisi">
        
        <div id="loading" class="loading">Yapay Zeka Biyometrik Taramayı Yapıyor...</div>
        <div id="info" class="info"></div>
        <div id="resultIcon" class="result"></div>
    </div>

    <script>
        // 1. KENDİ FİREBASE BİLGİLERİNİ BURAYA GİR (kayit.html ile aynı olmalı)
        const firebaseConfig = {
            apiKey: "SENIN_API_KEY",
            authDomain: "SENIN_PROJEN.firebaseapp.com",
            databaseURL: "https://SENIN_PROJEN.firebaseio.com",
            projectId: "SENIN_PROJEN",
            storageBucket: "SENIN_PROJEN.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const imgEl = document.getElementById('gelenFoto');
        const infoEl = document.getElementById('info');
        const resultIcon = document.getElementById('resultIcon');
        const loadingEl = document.getElementById('loading');

        // 2. Firebase'i Sürekli Dinleme (Realtime)
        // 'biyometrik_islem' düğümünde bir değişiklik olduğunda anında tetiklenir
        db.ref('biyometrik_islem').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.fotoğraf) {
                // Ekranı sıfırla ve yeni resmi göster
                imgEl.src = data.fotoğraf;
                imgEl.style.display = "block";
                resultIcon.innerHTML = "";
                loadingEl.style.display = "block";
                infoEl.innerHTML = `Aranan Kriter: <b>${data.secilenHedef.toUpperCase().replace(/_/g, ' ')}</b>`;

                // 3. Tarama Simülasyonu
                // Burada yüz tarama kütüphanesi (face-api.js vb.) devreye girmelidir.
                // Şimdilik 2 saniye bekleyip uyuşma durumunu rastgele simüle ediyoruz.
                setTimeout(() => {
                    loadingEl.style.display = "none";
                    
                    // Rastgele sonuç oluştur (Gerçek sistemde analiz sonucu buraya gelecek)
                    const uyumluMu = Math.random() > 0.4; 

                    if (uyumluMu) {
                        resultIcon.innerHTML = "✅";
                        resultIcon.style.color = "green";
                    } else {
                        resultIcon.innerHTML = "❌";
                        resultIcon.style.color = "red";
                    }
                }, 2000);
            }
        });
    </script>
</body>
</html>
