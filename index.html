<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Biyometrik Tarama (İkiz Korumalı)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background-color: #0d0d0d; color: white; padding: 20px; }
        #camera-container { position: relative; display: inline-block; margin-top: 30px; }
        video { border: 4px solid #333; border-radius: 15px; transform: scaleX(-1); box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        
        #status-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 70px; font-weight: bold; background: rgba(0,0,0,0.75);
            border-radius: 15px; display: none; text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            flex-direction: column; backdrop-filter: blur(4px);
        }
        #status-text { font-size: 20px; margin-top: 15px; text-align: center; padding: 0 15px; line-height: 1.4; }
        
        /* 1. Aşama: Yatay Lazer Tarama */
        .scan-line {
            width: 100%; height: 4px; background: rgba(0, 255, 0, 0.6);
            position: absolute; top: 0; left: 0; box-shadow: 0 0 15px rgba(0,255,0,0.9);
            animation: scan 2s infinite linear; display: none;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; }
        }

        /* 3. Aşama: İris Tarama Halkası (İkiz Koruması) */
        .iris-scanner {
            width: 120px; height: 120px; border: 4px dashed #e040fb; border-radius: 50%;
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #e040fb, inset 0 0 20px #e040fb;
            animation: spin 3s infinite linear, pulse 1.5s infinite alternate; display: none;
        }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes pulse { 0% { width: 120px; height: 120px; opacity: 0.7; } 100% { width: 140px; height: 140px; opacity: 1; } }
    </style>
</head>
<body>

    <h2>Ajan Seviyesi Doğrulama Terminali</h2>
    <p style="color:#888;">Protokol hazır. Ağ üzerinden veri bekleniyor...</p>

    <div id="camera-container">
        <video id="webcam" width="400" height="400" autoplay playsinline></video>
        <div class="scan-line" id="scan-line"></div>
        <div class="iris-scanner" id="iris-scanner"></div>
        
        <div id="status-overlay">
            <span id="icon">⏳</span>
            <span id="status-text">Bağlantı Kuruluyor...</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_DeLxJMTyRgQ3Agz0zYAen47XqA2Kq9Y",
            authDomain: "biyo-9104d.firebaseapp.com",
            projectId: "biyo-9104d",
            storageBucket: "biyo-9104d.firebasestorage.app",
            messagingSenderId: "796487556743",
            appId: "1:796487556743:web:e72c1c8f366930f73b2222"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: true })
            .then((stream) => { video.srcObject = stream; })
            .catch((err) => { alert("Kamera açılamadı!"); });

        const overlay = document.getElementById('status-overlay');
        const icon = document.getElementById('icon');
        const statusText = document.getElementById('status-text');
        const scanLine = document.getElementById('scan-line');
        const irisScanner = document.getElementById('iris-scanner');

        const scanDataRef = ref(db, 'biometricGame/scanData');
        
        onValue(scanDataRef, (snapshot) => {
            const data = snapshot.val();
            
            if (data && data.status === "pending") {
                
                // --- 1. AŞAMA: Temel Vektör Analizi ---
                overlay.style.display = 'flex';
                scanLine.style.display = 'block';
                irisScanner.style.display = 'none';
                icon.innerText = "🔍";
                statusText.innerText = "Aşama 1: Yüz Vektörleri Eşleştiriliyor...";
                statusText.style.color = "#ffeb3b"; // Sarı

                setTimeout(() => {
                    // --- 2. AŞAMA: Canlılık Tespiti ---
                    icon.innerText = "👀";
                    statusText.innerText = "Aşama 2: Canlılık Testi\n(Göz Kırpma Bekleniyor...)";
                    statusText.style.color = "#00bcd4"; // Mavi/Camgöbeği
                    scanLine.style.background = "rgba(0, 188, 212, 0.6)";

                    setTimeout(() => {
                        // --- 3. AŞAMA: İris Analizi (İkiz Koruması) ---
                        scanLine.style.display = 'none'; // Yatay lazeri kapat
                        irisScanner.style.display = 'block'; // Dairesel iris tarayıcıyı aç
                        icon.innerText = "👁️";
                        statusText.innerText = "Aşama 3: İris Desen Analizi\n(Anti-İkiz Protokolü Devrede)";
                        statusText.style.color = "#e040fb"; // Mor/Magenta

                        setTimeout(() => {
                            // FİNAL: Sonuç Kararı
                            irisScanner.style.display = 'none';
                            
                            // Rastgele sonuç oluştur. 
                            const roll = Math.random();
                            let isSuccess = false;
                            let failMessage = "";

                            if (roll > 0.6) {
                                isSuccess = true;
                            } else if (roll > 0.4) {
                                failMessage = "Erişim Reddedildi!\n(Canlılık Tespiti Başarısız)";
                            } else if (roll > 0.2) {
                                failMessage = "Erişim Reddedildi!\n(İkiz Tespit Edildi: İris uyuşmazlığı!)";
                            } else {
                                failMessage = "Erişim Reddedildi!\n(Yüz geometrisi eşleşmedi)";
                            }

                            if (isSuccess) {
                                icon.innerText = "✅";
                                statusText.innerText = "Tüm Protokoller Onaylandı!\nKimlik Doğrulandı.";
                                statusText.style.color = "#4CAF50"; // Yeşil
                            } else {
                                icon.innerText = "🚫";
                                statusText.innerText = failMessage;
                                statusText.style.color = "#f44336"; // Kırmızı
                            }

                            set(ref(db, 'biometricGame/scanData/status'), isSuccess ? "completed" : "failed");

                            setTimeout(() => {
                                overlay.style.display = 'none';
                            }, 5000);

                        }, 3500); // 3. Aşama süresi
                    }, 3000); // 2. Aşama süresi
                }, 2500); // 1. Aşama süresi
            }
        });
    </script>
</body>
</html>
